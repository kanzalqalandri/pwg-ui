name: Deploy
on:
  workflow_dispatch:
    inputs:
      env:
        description: 'Target environment (e.g. dev, qa, prod) — validated server-side'
        required: true
        type: string
      image_tag:
        description: 'Image tag (e.g. alpine, latest)'
        required: true
        type: string

jobs:
  deploy:
    uses: kanzalqalandri/platform-workflows/.github/workflows/deploy.yml@main
    with:
      plane: powergrader
      key: ${{ inputs.env }}
      app: pwg-ui
      image_tag: ${{ inputs.image_tag }}
    secrets: inherit
